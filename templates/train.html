<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>訓練模型</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            max-width: 800px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .status-idle { background: #f5f5f5; }
        .status-running { background: #fff8e1; border-color: #ffca28; }
        .status-done { background: #e8f5e9; border-color: #66bb6a; }
        .status-error { background: #ffebee; border-color: #ef5350; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ccc;
            border-top-color: #ff9800;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 16px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            font-size: 14px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .best-tag {
            background: #66bb6a;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 6px;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <h1>訓練模型</h1>
    <p><a href="/">回首頁</a> | <a href="/ml/predict">前往預測</a> | <a href="/analysis">資料分析</a></p>

    <p>
        點擊下方按鈕，會用目前資料庫（titanic 資料表）裡的資料，
        分別對「邏輯迴歸」與「隨機森林」兩種模型做超參數搜尋（GridSearchCV），
        並自動選出測試集準確率最高的模型存檔。
    </p>

    <button id="trainBtn" onclick="startTraining()">開始訓練模型</button>

    <div id="statusBox" class="status-box status-idle">
        <p id="statusText">尚未訓練</p>
    </div>

    <div id="resultArea"></div>

    <script>
        let pollingTimer = null;

        // 頁面載入時，先查一次目前狀態（可能上次已經訓練過，或是正在訓練中）
        window.addEventListener("DOMContentLoaded", () => {
            refreshStatus();
        });

        async function startTraining() {
            const btn = document.getElementById("trainBtn");
            btn.disabled = true;

            const response = await fetch("/api/ml/train", { method: "POST" });

            if (!response.ok) {
                const result = await response.json();
                alert(result.error || "無法開始訓練");
                btn.disabled = false;
                return;
            }

            // 開始訓練後，每 1 秒查一次狀態，直到訓練完成或失敗
            if (pollingTimer) clearInterval(pollingTimer);
            pollingTimer = setInterval(refreshStatus, 1000);
            refreshStatus();
        }

        async function refreshStatus() {
            const response = await fetch("/api/ml/status");
            const state = await response.json();
            renderStatus(state);

            // 訓練完成或發生錯誤時，就停止輪詢，並把按鈕恢復成可以點擊
            if (state.status === "done" || state.status === "error") {
                if (pollingTimer) {
                    clearInterval(pollingTimer);
                    pollingTimer = null;
                }
                document.getElementById("trainBtn").disabled = false;
            } else if (state.status === "running") {
                document.getElementById("trainBtn").disabled = true;
                // 如果重新整理頁面時發現正在訓練中，要記得繼續輪詢
                if (!pollingTimer) {
                    pollingTimer = setInterval(refreshStatus, 1000);
                }
            }
        }

        function renderStatus(state) {
            const box = document.getElementById("statusBox");
            const text = document.getElementById("statusText");

            box.className = "status-box status-" + state.status;

            if (state.status === "idle") {
                text.textContent = "尚未訓練，點擊上方按鈕開始訓練";
            } else if (state.status === "running") {
                text.innerHTML = `<span class="spinner"></span>訓練中... ${state.message || ""}`;
            } else if (state.status === "error") {
                text.textContent = `訓練失敗：${state.error || ""}`;
            } else if (state.status === "done") {
                text.textContent = `✅ 訓練完成（${state.trained_at || ""}）`;
                renderResult(state);
            }
        }

        function renderResult(state) {
            const area = document.getElementById("resultArea");

            const candidates = state.all_candidates_results || {};
            let rows = "";
            for (const name of Object.keys(candidates)) {
                const c = candidates[name];
                const isBest = name === state.best_model_name;
                rows += `
                    <tr>
                        <td>${name}${isBest ? '<span class="best-tag">最佳</span>' : ""}</td>
                        <td>${(c.cv_accuracy * 100).toFixed(2)}%</td>
                        <td>${(c.test_accuracy * 100).toFixed(2)}%</td>
                        <td><pre>${JSON.stringify(c.best_params, null, 2)}</pre></td>
                    </tr>
                `;
            }

            area.innerHTML = `
                <h3>訓練結果比較</h3>
                <p>本次使用資料庫中 ${state.n_samples} 筆資料訓練。</p>
                <table>
                    <thead>
                        <tr>
                            <th>模型</th>
                            <th>交叉驗證準確率 (CV)</th>
                            <th>測試集準確率</th>
                            <th>最佳超參數</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                <p>模型已存檔至 <code>models/titanic_model.joblib</code>，可以到
                    <a href="/ml/predict">預測頁面</a> 使用這個模型做預測。</p>
            `;
        }
    </script>
</body>

</html>
